name: brew_haiku
description: A mindful brewing timer app with haiku poetry, powered by Bluesky.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # UI
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

  # Network
  http: ^1.2.0
  url_launcher: ^6.2.0
  connectivity_plus: ^6.0.0

  # Storage
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.0

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
