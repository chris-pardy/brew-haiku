app = "brew-haiku"
primary_region = "sjc"

[env]
  HOST = "::"
  # Gateway
  GATEWAY_PORT = "8080"
  FEED_INTERNAL_URL = "http://feed.process.brew-haiku.internal:8080"
  TIMERS_INTERNAL_URL = "http://timers.process.brew-haiku.internal:8083"
  # Feed service
  FEED_PORT = "8080"
  FEED_INGEST_PORT = "8081"
  FEED_DATABASE_PATH = "/data/feed.db"
  # Timers service
  TIMERS_PORT = "8083"
  TIMERS_INGEST_PORT = "8082"
  TIMERS_DATABASE_PATH = "/data/timers.db"
  DEFAULT_ACCOUNT_DID = "did:plc:mkeyzlz3mvjqjsmes7zpnowz"
  # Ingest worker
  CURSOR_PATH = "/data/cursor"
  FEED_INGEST_URL = "ws://feed.process.brew-haiku.internal:8081"
  TIMER_INGEST_URL = "ws://timers.process.brew-haiku.internal:8082"

# ---------------------------------------------------------------------------
# Process groups — gateway, feed, ingest, and timers run on separate machines
# ---------------------------------------------------------------------------
[processes]
  gateway = "bun run gateway/src/index.ts"
  feed = "bun run feed/src/index.ts"
  ingest = "bun run ingest/src/index.ts"
  timers = "bun run timers/src/index.ts"

# Gateway is the only process exposed to the internet.
# It routes to feed and timers via Fly internal DNS.
[[services]]
  internal_port = 8080
  protocol = "tcp"
  processes = ["gateway"]

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

# Feed volume — SQLite database + ingestion
[[mounts]]
  source = "feed_data"
  destination = "/data"
  processes = ["feed"]

# Ingest volume — cursor file persistence
[[mounts]]
  source = "ingest_data"
  destination = "/data"
  processes = ["ingest"]

# Timers volume — SQLite database + ingestion
[[mounts]]
  source = "timers_data"
  destination = "/data"
  processes = ["timers"]

# Gateway VM — minimal, just proxies
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["gateway"]

# Feed VM — lightweight, serves reads
[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["feed"]

# Ingest VM — word-list scoring, lightweight
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["ingest"]

# Timers VM — lightweight, serves reads + timer ingestion
[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["timers"]

[checks]
  [checks.feed_health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    processes = ["feed"]

  [checks.timers_health]
    type = "http"
    port = 8083
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    processes = ["timers"]
