app = "brew-haiku"
primary_region = "sjc"

[env]
  PORT = "8080"
  ENABLE_FIREHOSE = "true"
  DATABASE_PATH = "/data/brew-haiku.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[mounts]
  source = "brew_haiku_data"
  destination = "/data"

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
